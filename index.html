<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/brand/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0e0a" />
    <title>BasketPump — Play Hard. Pump High.</title>
    <meta name="description" content="BasketPump — fast arcade basketball brawler. Two hoops, team vs team. Play Hard. Pump High." />
  </head>
  <body>
    <div id="app">
      <!-- MENU -->
      <section id="menu-screen" class="screen active">
        <div class="menu-bg"></div>
        <div class="menu-inner">
          <img class="menu-logo" src="/brand/logo.jpg" alt="BasketPump" />
          <p class="tagline">PLAY HARD. <span class="g">PUMP HIGH.</span></p>

          <div class="menu-card">
            <div class="menu-row">
              <span class="lbl">MODE</span>
              <div class="seg" id="seg-mode">
                <button class="seg-btn active" data-mode="quick">Quick Match</button>
                <button class="seg-btn" data-mode="ranked">Ranked</button>
                <button class="seg-btn" data-mode="practice">Practice</button>
              </div>
            </div>
            <div class="menu-row">
              <span class="lbl">MATCH LENGTH</span>
              <div class="seg" id="seg-time">
                <button class="seg-btn" data-min="3">3 MIN</button>
                <button class="seg-btn active" data-min="5">5 MIN</button>
                <button class="seg-btn" data-min="7">7 MIN</button>
              </div>
            </div>
            <button id="play-btn" class="play-btn">▶ PLAY</button>
          </div>

          <div class="controls-hint">
            <div><b>A / D</b> Move</div><div><b>W</b> Jump</div>
            <div><b>E</b> Grab / Steal</div><div><b>Q</b> Pass</div>
            <div><b>Hold Space</b> Charge shot</div><div><b>Release</b> Shoot</div>
          </div>
          <p class="credit">BP · BasketPump Arena</p>
        </div>
      </section>

      <!-- GAME -->
      <section id="game-screen" class="screen">
        <canvas id="court"></canvas>
        <div id="hud">
          <div class="scorebar">
            <div class="team team-home"><span class="dot"></span>HOME</div>
            <div class="scoreblock"><span id="score-home">0</span><span class="sep">:</span><span id="score-away">0</span></div>
            <div class="team team-away">AWAY<span class="dot"></span></div>
            <div class="timer" id="timer">5:00</div>
          </div>
          <div id="ball-tag">YOU HAVE THE BALL</div>
          <div class="stamina-wrap"><div class="stamina-lbl">STAMINA</div><div class="stamina-bar"><div id="stamina-fill"></div></div></div>
          <div id="action-hint" class="action-hint"></div>
          <div id="toast"></div>
        </div>
        <div class="keycaps">
          <span><b>A&nbsp;/&nbsp;D</b> move</span><span><b>W</b> jump</span>
          <span><b>E</b> grab</span><span><b>Q</b> pass</span>
          <span class="hot"><b>Hold&nbsp;/&nbsp;Space</b></span><span>charge&nbsp;&amp;&nbsp;shoot</span>
        </div>
        <div id="gameover" class="overlay hidden">
          <div class="go-card">
            <h2 id="go-title">MATCH OVER</h2>
            <div class="go-score"><span id="go-home">0</span> : <span id="go-away">0</span></div>
            <p id="go-sub"></p>
            <button id="go-rematch" class="play-btn">REMATCH</button>
            <button id="go-menu" class="ghost-btn">MENU</button>
          </div>
        </div>
        <button id="quit-btn" title="Quit">✕</button>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
